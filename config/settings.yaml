# FETM Strategy — Master Configuration

data:
  ticker: "SPY"
  start_date: "1993-01-01"
  storage_dir: "data/raw"

strategy:
  name: "FETM"
  target_vol: 0.15
  portfolio_target_vol: 0.12
  max_leverage: 3.0
  rebalance_frequency: 5
  rebalance_vol_threshold: 0.20
  rebalance_signal_threshold: 1.5

volatility:
  ewma:
    halflife: 60
    min_history: 60
  parkinson:
    window: 20
  exit_time:
    corridor_width: 0.012
    buffer_size: 30
    max_no_exit_days: 60
    bias_correction: true
  composite:
    blend_steepness: 5.0
    max_fet_weight: 0.8

momentum:
  lookback_days: [21, 63, 252]
  horizon_weights: [0.25, 0.40, 0.35]
  scurve_lambda: 0.394
  signal_normalization_window: 252
  signal_cap: 5.0

costs:
  equity_etf_bps: 5
  commodity_etf_bps: 10
  bond_etf_bps: 3
  currency_etf_bps: 8

backtest:
  start_date: "1994-01-01"
  warmup_days: 252
  in_sample_end: "2014-12-31"
  risk_free_rate: 0.02
  walk_forward:
    initial_window_years: 5
    refit_frequency_years: 1

output:
  runs_dir: "output/runs"
  plot_style: "dark"
  figure_dpi: 150

crisis_periods:
  dotcom:
    name: "Dot-com Bust"
    start: "2000-03-24"
    end: "2002-10-09"
  gfc:
    name: "Global Financial Crisis"
    start: "2007-10-09"
    end: "2009-03-09"
  flash_crash:
    name: "Flash Crash / China Deval"
    start: "2015-08-18"
    end: "2015-08-25"
  q4_2018:
    name: "Q4 2018 Selloff"
    start: "2018-10-01"
    end: "2018-12-24"
  covid:
    name: "COVID Crash"
    start: "2020-02-19"
    end: "2020-03-23"
  rate_hikes:
    name: "2022 Rate Hiking Cycle"
    start: "2022-01-03"
    end: "2022-10-12"
  tariff_2025:
    name: "2025 Tariff Crisis"
    start: "2025-02-01"
    end: "2025-06-30"
